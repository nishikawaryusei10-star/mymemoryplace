<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>世界觀資料庫</title>

<style>
body {
  margin: 0;
  font-family: "Noto Sans TC", sans-serif;
  background: #eef1f5;
  color: #222;
}

/* ===== 頂部 ===== */
.header {
  background: linear-gradient(135deg, #1e2a38, #2f3e52);
  color: white;
  padding: 40px 20px;
  text-align: center;
}

.header h1 {
  margin: 0;
  font-size: 34px;
  letter-spacing: 2px;
}

.header p {
  margin-top: 10px;
  opacity: 0.85;
}

/* ===== 主體 ===== */
.container {
  max-width: 1100px;
  margin: -30px auto 40px auto;
  padding: 20px;
}

/* ===== 卡片區 ===== */
.grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 25px;
}

.card {
  background: white;
  padding: 25px;
  border-radius: 14px;
  box-shadow: 0 6px 15px rgba(0,0,0,0.08);
  transition: 0.25s;
  position: relative;
  overflow: hidden;
}

.card:hover {
  transform: translateY(-5px);
}

/* 卡片左側色條 */
.card::before {
  content: "";
  position: absolute;
  left: 0;
  top: 0;
  width: 6px;
  height: 100%;
}

/* 不同入口顏色 */
.timeline::before {
  background: #3b82f6;
}

.character::before {
  background: #10b981;
}

.card a {
  text-decoration: none;
  font-size: 22px;
  font-weight: bold;
  color: #1e40af;
}

.card p {
  margin-top: 10px;
  color: #444;
}

/* ===== 區塊 ===== */
.section {
  margin-top: 35px;
  background: white;
  padding: 20px 25px;
  border-radius: 14px;
  box-shadow: 0 4px 10px rgba(0,0,0,0.05);
}

.section h2 {
  margin-top: 0;
  border-left: 5px solid #3b82f6;
  padding-left: 10px;
}

/* ===== 清單 ===== */
ul {
  padding-left: 20px;
  line-height: 1.9;
}

a {
  color: #2563eb;
}

a:hover {
  text-decoration: underline;
}

/* ===== 小細節 ===== */
.tag {
  display: inline-block;
  background: #e0e7ff;
  color: #3730a3;
  padding: 3px 8px;
  border-radius: 6px;
  font-size: 12px;
  margin-left: 6px;
}
</style>
</head>

<body>

<div class="header">
  <h1>《你的世界名稱》</h1>
  <p>一個持續演化的故事世界</p>
</div>

<div class="container">

  <!-- 入口 -->
  <div class="grid">

    <div class="card timeline">
      <a href="timeline.html">📜 編年體（時間線）</a>
      <p>依照年份追蹤世界發展與重大事件。</p>
    </div>

    <div class="card character">
      <a href="characters.html">👤 紀傳體（人物）</a>
      <p>深入角色背景與其在歷史中的位置。</p>
    </div>

  </div>

  <!-- 世界觀 -->
  <div class="section">
    <h2>世界簡介</h2>
    <p>
      這裡寫你的世界觀，例如：年代、衝突、核心主題。
      可以寫得有一點文學感，讓人一進來就有氣氛。
    </p>
  </div>

  <!-- 更新 -->
  <div class="section">
    <h2>最近更新</h2>
    <ul>
      <li>
        <a href="timeline/2026.html">2026年時間線</a>
        <span class="tag">NEW</span>
      </li>
      <li>
        <a href="characters/char_01.html">新增人物：某某</a>
      </li>
    </ul>
  </div>

  <!-- 快速入口 -->
  <div class="section">
    <h2>快速入口</h2>
    <ul>
      <li><a href="timeline/2050.html">2050年</a></li>
      <li><a href="characters/char_01.html">主角人物</a></li>
    </ul>
  </div>

</div>

</body>
</html>
